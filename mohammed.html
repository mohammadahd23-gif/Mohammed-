<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="وصف احترافي لموقعك لتعزيز ظهورك في محركات البحث">
    <title>اسم موقعك | واجهتك الاحترافية</title>
    
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<title>mohammed.html</title>
<body>

    <header>
        <nav class="navbar">
            <div class="logo">شعار الموقع</div>
            <ul class="nav-links">
                <li><a href="#home">الرئيسية</a></li>
                <li><a href="#services">خدماتنا</a></li>
                <li><a href="#about">من نحن</a></li>
                <li><a href="#contact" class="btn-cta">اتصل بنا</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section id="home" class="hero">
            <div class="hero-content">
               <h1> تحياتي محمد خالد شحبل</h1>
                <p>نحن نقدم حلولاً تقنية متطورة تناسب طموحاتك.</p>
                <div class="cta-buttons">
                    <button class="btn-primary">ابدأ الآن</button>
                    <button class="btn-secondary">مشاهدة الأعمال</button>
                </div>
            </div>
        </section>

        <section id="services" class="services">
            <h2 class="section-title">خدماتنا المميزة</h2>
            <div class="services-grid">
                <article class="service-card">
                    <i class="fas fa-code"></i>
                    <h3>تطوير الويب</h3>
                    <p>بناء مواقع سريعة ومتجاوبة مع كافة الشاشات.</p>
                </article>
                <article class="service-card">
                    <i class="fas fa-paint-brush"></i>
                    <h3>تصميم UI/UX</h3>
                    <p>واجهات مستخدم جذابة وتجربة مستخدم سلسة.</p>
                </article>
            </div>
        </section>
    </main>

    <footer>
        <div class="footer-container">
            <p>جميع الحقوق محفوظة &copy; 2024</p>
            <div class="social-media">
                <a href="#"><i class="fab fa-twitter"></i></a>
                <a href="#"><i class="fab fa-linkedin"></i></a>
            </div>
        </div>
    </footer>

    <script src="main.js"></script>
